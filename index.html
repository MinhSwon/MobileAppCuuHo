<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#a04040" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Cứu hộ VN" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta
      name="description"
      content="Ứng dụng cảnh báo khẩn cấp, gửi SOS GPS và điều phối cứu hộ trên toàn Việt Nam."
    />
    <title>Ứng dụng cứu hộ Việt Nam</title>
    <script>
      window.__showStartupError = function (message) {
        var root = document.getElementById('root');
        if (!root) return;
        root.innerHTML = '<div style="font-family:Arial,sans-serif;padding:32px;color:#991b1b">' +
          '<h1 style="font-size:24px;margin-bottom:12px">Ứng dụng chưa khởi động được</h1>' +
          '<pre style="white-space:pre-wrap">' + String(message) + '</pre>' +
          '</div>';
      };
      window.addEventListener('error', function (event) {
        window.__showStartupError(event.message || 'Không tải được JavaScript bundle.');
      });
      window.addEventListener('unhandledrejection', function (event) {
        var reason = event.reason;
        window.__showStartupError(reason && reason.message ? reason.message : reason);
      });
      window.addEventListener('DOMContentLoaded', function () {
        setTimeout(function () {
          var root = document.getElementById('root');
          if (root && root.textContent.indexOf('Đang tải ứng dụng') !== -1) {
            window.__showStartupError('JavaScript bundle không chạy. Hãy cập nhật trình duyệt hoặc kiểm tra Console/Network xem file /assets/*.js có bị chặn không.');
          }
        }, 5000);
      });
    </script>
  </head>
  <body>
    <div id="root">
      <div style="font-family: Arial, sans-serif; padding: 32px; color: #0f172a;">
        Đang tải ứng dụng...
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
